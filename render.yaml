services:
  # â”€â”€ Backend FastAPI â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  - type: web
    name: exclusiva-backend
    runtime: python
    plan: free            # 750h/mÃªs grÃ¡tis â€” suficiente para uso contÃ­nuo
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false       # Preencher manualmente: URL do Neon.tech
      - key: REDIS_URL
        sync: false       # Preencher: URL do Upstash Redis
      - key: JWT_SECRET_KEY
        generateValue: true   # Render gera automaticamente
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_MINUTES
        value: "60"
      - key: ALLOWED_ORIGINS
        sync: false       # Ex: https://sistema-exclusiva.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
