services:
  - type: web
    name: exclusiva-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        value: '["https://sistema-exclusiva-pied.vercel.app"]'
      - key: LOG_LEVEL
        value: INFO
      - key: EXPOSE_METRICS
        value: "false"
