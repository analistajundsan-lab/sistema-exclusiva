<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#00341b" />
    <meta name="background-color" content="#00341b" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Exclusiva" />

    <!-- Apple touch icons (vários tamanhos para melhor suporte iOS) -->
    <link rel="apple-touch-icon" href="/icon-maskable.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Splash screen iOS (tela verde ao abrir o app) -->
    <meta name="msapplication-TileColor" content="#00341b" />

    <!-- Manifest e ícone padrão (marca verde oficial — o icon.svg azul foi descontinuado) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/logo-bus.svg" />

    <!-- SEO / Description -->
    <meta name="description" content="Central operacional de escala, trocas e ocorrências — Exclusiva Turismo" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <title>Sistema Exclusiva</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
