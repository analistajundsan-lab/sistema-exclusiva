name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Varredura semanal (segunda 06:00 UTC) para pegar CVEs novas em deps fixas.
    - cron: "0 6 * * 1"

jobs:
  python-deps:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pip-audit
      # Informativo: nao bloqueia o merge, mas reporta CVEs nas dependencias.
      - name: pip-audit
        continue-on-error: true
        run: pip-audit -r backend/requirements.txt --strict

  frontend-deps:
    name: Frontend dependency audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      # Falha apenas em vulnerabilidades de severidade alta/critica.
      - name: npm audit
        run: cd frontend && npm audit --audit-level=high
